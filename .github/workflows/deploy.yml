name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # キャッシュ対象のlockファイルの場所を正確に指定
          cache-dependency-path: './depth-shooyrt/package-lock.json'

      - name: Install dependencies
        # サブディレクトリに移動してから npm ci を実行
        run: npm ci
        working-directory: ./depth-shooyrt

      - name: Build
        # ビルドもサブディレクトリ内で実行
        run: npm run build
        working-directory: ./depth-shooyrt

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ビルド結果(dist)がサブディレクトリ内にあるため、パスを合わせる
          path: ./depth-shooyrt/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
